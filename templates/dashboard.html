{% extends "base.html" %}

{% block content %}

<div class="dashboard-container">

    <h1 class="page-title">Health Dashboard</h1>

    <div class="cards-row">
        <div class="stat-card">
            <h3>Total Entries</h3>
            <p>{{ total_entries }}</p>
        </div>

        <div class="stat-card">
            <h3>Average Weight</h3>
            <p>{{ avg_weight }} kg</p>
        </div>

        <div class="stat-card">
            <h3>Average Steps</h3>
            <p>{{ avg_steps }}</p>
        </div>

        <div class="stat-card">
            <h3>Average Water</h3>
            <p>{{ avg_water }} ml</p>
        </div>
    </div>

    <div class="charts-row">

        <div class="chart-card">
            <h3>Weight Trend</h3>
            <canvas id="weightChart"></canvas>
        </div>

        <div class="chart-card">
            <h3>Steps Trend</h3>
            <canvas id="stepsChart"></canvas>
        </div>

        <div class="chart-card">
            <h3>Water Intake Trend</h3>
            <canvas id="waterChart"></canvas>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const dates = {{ dates | tojson }};
    const weights = {{ weights | tojson }};
    const steps = {{ steps | tojson }};
    const water = {{ water | tojson }};

    // Weight Chart
    new Chart(document.getElementById('weightChart'), {
        type: 'line',
        data: {
            labels: dates,
            datasets: [{
                label: 'Weight (kg)',
                data: weights,
                borderColor: '#4f46e5',
                backgroundColor: 'rgba(79, 70, 229, 0.2)',
                tension: 0.3
            }]
        }
    });

    // Steps Chart
    new Chart(document.getElementById('stepsChart'), {
        type: 'bar',
        data: {
            labels: dates,
            datasets: [{
                label: 'Steps',
                data: steps,
                backgroundColor: '#10b981'
            }]
        }
    });

    // Water Chart
    new Chart(document.getElementById('waterChart'), {
        type: 'line',
        data: {
            labels: dates,
            datasets: [{
                label: 'Water (ml)',
                data: water,
                borderColor: '#0ea5e9',
                backgroundColor: 'rgba(14, 165, 233, 0.2)',
                tension: 0.3
            }]
        }
    });
</script>

{% endblock %}
